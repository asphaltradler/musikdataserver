<app-searchfield  [thisEntity]="entityType" [(searchEntity)]="searchEntityType" [(pageSize)]="pageSize"
                  [(searchString)]="searchName" [(filterString)]="filter"/>
<app-paging [entityList]="this"/>

<div class="card my-3">
  <app-list-header [title]="title" [lastSearchPerformance]="lastSearchPerformance"></app-list-header>
  <table class="card-body small table table-bordered table-striped table-hover table-sm my-0">
    <thead class="thead-dark">
    <tr>
      <th class="text-right">#</th>
      <th>Name</th>
      <th *ngFor="let cat of searchableEntities">
        {{ cat.namePlural }}
      </th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let album of entities; trackBy: trackByItemId">
      <td class="text-right">{{ album.id }}</td>
      <td>{{ album.name }}</td>
      <td *ngFor="let cat of searchableEntities">
        @if (cat === Track) {
          <a title="{{ Track.getNumberDescription(album.tracks?.length) }} für {{album.name}}"
             (click)="navigateOtherEntityByThis(Track, album)">
            {{ Track.getNumberDescription(album.tracks?.length) }}
          </a>
        } @else {
          <div *ngFor="let searchEntity of getEntityList(album, cat)">
            <a (click)="navigateOtherEntityByItself(cat, searchEntity)"
               title="Details für {{searchEntity.name}}">
              {{ searchEntity.name }}
            </a>
            <a (click)="navigateOtherEntityBy(Album, cat, searchEntity)"
               class="btn-link"
               title="{{ Album.namePlural}} für {{searchEntity.name}}">
              [&nbsp;{{ Album.namePlural }}&nbsp;]
            </a>
          </div>
        }
      </td>
    </tr>
    </tbody>
  </table>
</div>

<div class="my-3">&nbsp;</div>
<app-paging class="card footer-absolute" [entityList]="this"/>
